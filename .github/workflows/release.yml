name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Build binary
        run: |
          mkdir -p out
          # Replace with actual build command for your project
          echo '#!/bin/bash' > out/lemon-ai
          echo 'echo "Lemon AI v${{ github.ref_name }} running..."' >> out/lemon-ai
          echo 'echo "Visit: https://devonn.ai"' >> out/lemon-ai
          chmod +x out/lemon-ai

      - name: Package Linux
        run: |
          mkdir -p dist
          tar -czf dist/lemon-ai-linux-x64.tar.gz -C out lemon-ai
          sha256sum dist/lemon-ai-linux-x64.tar.gz > dist/lemon-ai-linux-x64.tar.gz.sha256

      - name: Package macOS
        run: |
          tar -czf dist/lemon-ai-macos-x64.tar.gz -C out lemon-ai
          sha256sum dist/lemon-ai-macos-x64.tar.gz > dist/lemon-ai-macos-x64.tar.gz.sha256

      - name: Package Windows (placeholder)
        run: |
          # For actual Windows builds, use a Windows runner
          cp out/lemon-ai out/lemon-ai.exe
          zip -j dist/lemon-ai-win-x64.zip out/lemon-ai.exe
          sha256sum dist/lemon-ai-win-x64.zip > dist/lemon-ai-win-x64.zip.sha256

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            dist/lemon-ai-linux-x64.tar.gz
            dist/lemon-ai-linux-x64.tar.gz.sha256
            dist/lemon-ai-macos-x64.tar.gz
            dist/lemon-ai-macos-x64.tar.gz.sha256
            dist/lemon-ai-win-x64.zip
            dist/lemon-ai-win-x64.zip.sha256
          generateReleaseNotes: true
          body: |
            ## Installation

            ### Linux / macOS (System-wide)
            ```bash
            /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/wesship/lemon-ai/main/public/installers/install.sh)"
            ```

            ### Linux / macOS (User-only, no sudo)
            ```bash
            /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/wesship/lemon-ai/main/public/installers/install-user.sh)"
            ```

            ### Windows (System-wide, requires Admin)
            ```powershell
            iex (New-Object Net.WebClient).DownloadString('https://raw.githubusercontent.com/wesship/lemon-ai/main/public/installers/install.ps1')
            ```

            ### Windows (User-only, no Admin)
            ```powershell
            iex (New-Object Net.WebClient).DownloadString('https://raw.githubusercontent.com/wesship/lemon-ai/main/public/installers/install-user.ps1')
            ```

            ## What's Changed
            See full changelog below.
