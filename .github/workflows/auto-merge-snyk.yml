name: Auto-merge Snyk Security PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge-snyk:
    name: Auto-merge Snyk PRs
    runs-on: ubuntu-latest
    if: |
      contains(github.event.pull_request.title, '[Snyk]') ||
      contains(github.event.pull_request.title, 'Security upgrade') ||
      contains(github.event.pull_request.title, 'security upgrade')
    steps:
      - name: Update branch to resolve conflicts
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) { console.log('No PR in context'); return; }
            
            // Try to update branch (rebase onto main)
            try {
              await github.rest.pulls.updateBranch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
              });
              console.log(`✓ Branch updated for PR #${pr.number}`);
            } catch(e) {
              console.log(`Branch update skipped: ${e.message}`);
            }
            
            // Add labels
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['auto-merge', 'security']
              });
            } catch(e) { /* labels may already exist */ }
            
            // Enable auto-merge via GraphQL
            try {
              await github.graphql(`
                mutation($id: ID!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $id,
                    mergeMethod: SQUASH
                  }) {
                    pullRequest { number }
                  }
                }
              `, { id: pr.node_id });
              console.log(`✓ Auto-merge enabled for PR #${pr.number}`);
            } catch(e) {
              console.log(`Auto-merge: ${e.message}`);
            }
