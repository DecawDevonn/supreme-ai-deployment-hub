name: Devonn.AI Infra Tracker

on:
  push:
    branches: [ devonn-hybrid-build ]
  workflow_dispatch:

jobs:
  update-infra-tracking:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Update Infra Tracking
        run: python infra/update-tracking.py

      - name: Commit & Push changes
        run: |
          git config user.name "Devonn.AI Bot"
          git config user.email "bot@devonn.ai"
          git add devonn-infra-tracking.yml
          git commit -m "Update infra tracking timestamp"
          git push
