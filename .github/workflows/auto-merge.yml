name: Auto Merge Safe PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]
  check_suite:
    types: [completed]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only auto-merge PRs opened by the AI agent
    if: |
      startsWith(github.head_ref, 'auto/fix-') ||
      startsWith(github.event.pull_request.title, '[Auto Fix]')

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Enable auto-merge for AI-generated PRs
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN_WRITE }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --merge \
            --auto \
            --delete-branch \
            --repo ${{ github.repository }} || echo "Auto-merge already enabled or PR not ready"
