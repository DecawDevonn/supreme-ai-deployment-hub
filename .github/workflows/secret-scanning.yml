name: Secret Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run weekly full scan on Sundays at 3 AM UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Full history for comprehensive scan

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Gitleaks Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 30

  scan-summary:
    name: Secret Scan Summary
    runs-on: ubuntu-latest
    needs: [gitleaks]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Check scan results
        run: |
          if [ "${{ needs.gitleaks.result }}" == "failure" ]; then
            echo "⚠️ Secret scanning detected potential issues!"
            echo "Review the Gitleaks scan results and take appropriate action."
            echo "See docs/runbooks/credential_leak_migration.md for remediation procedures."
            exit 1
          else
            echo "✅ No secrets detected in scan"
          fi
