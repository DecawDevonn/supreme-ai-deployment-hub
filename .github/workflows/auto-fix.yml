name: Autonomous Fix Engine

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:
    inputs:
      issue_body:
        description: "GitHub issue body to fix (optional)"
        required: false
        default: ""
  workflow_run:
    workflows: ["CI — Test, Lint & Coverage"]
    types: [completed]

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    # Only run on schedule/dispatch, OR when CI failed
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure')

    permissions:
      contents: write
      pull-requests: write
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN_WRITE }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install openai flake8

      - name: Configure git identity
        run: |
          git config user.email "devonn-ai@users.noreply.github.com"
          git config user.name "Devonn AI Agent"
          git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN_WRITE }}@github.com/${{ github.repository }}

      - name: Run Devonn AI Fix Engine
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN_WRITE }}
          SECRET_KEY: test-secret-key-for-ci-32-chars!!
          JWT_SECRET_KEY: test-jwt-secret-key-for-ci-32chars
          FLASK_TESTING: "true"
          RATELIMIT_ENABLED: "false"
        run: |
          python scripts/ai/propose_fixes.py \
            --issue-body "${{ github.event.inputs.issue_body || '' }}"
