name: Autonomous Fix Engine

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:
    inputs:
      issue_body:
        description: "GitHub issue body to fix (optional)"
        required: false
        default: ""
  workflow_run:
    workflows: ["CI — Test, Lint & Coverage"]
    types: [completed]

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    # Only run on schedule/dispatch, OR when CI failed
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure')

    permissions:
      contents: write
      pull-requests: write
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN_WRITE }}
          fetch-depth: 0

      - name: Debug repo structure
        run: |
          echo "Current directory: $(pwd)"
          echo "---- Root contents ----"
          ls -la
          echo "---- scripts directory ----"
          ls -la scripts/ || echo "No scripts directory"
          echo "---- scripts/ai directory ----"
          ls -la scripts/ai/ || echo "No scripts/ai directory"
          echo "---- find propose_fixes.py ----"
          find . -name "propose_fixes.py" 2>/dev/null || echo "File not found anywhere"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai flake8
          if [ -f scripts/ai/requirements.txt ]; then
            pip install -r scripts/ai/requirements.txt
          fi
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Verify script exists
        id: verify_script
        run: |
          SCRIPT_PATH="scripts/ai/propose_fixes.py"
          if [ ! -f "$SCRIPT_PATH" ]; then
            echo "::error::Script not found at $SCRIPT_PATH"
            echo "Searching for file..."
            find . -name "propose_fixes.py" 2>/dev/null || true
            exit 1
          fi
          echo "Script found at: $SCRIPT_PATH"
          echo "path=$SCRIPT_PATH" >> $GITHUB_OUTPUT
          chmod +x "$SCRIPT_PATH"

      - name: Configure git identity
        run: |
          git config user.email "devonn-ai@users.noreply.github.com"
          git config user.name "Devonn AI Agent"
          git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN_WRITE }}@github.com/${{ github.repository }}

      - name: Run Devonn AI Fix Engine
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN_WRITE }}
          SECRET_KEY: test-secret-key-for-ci-32-chars!!
          JWT_SECRET_KEY: test-jwt-secret-key-for-ci-32chars
          FLASK_TESTING: "true"
          RATELIMIT_ENABLED: "false"
        run: |
          python scripts/ai/propose_fixes.py \
            --issue-body "${{ github.event.inputs.issue_body || '' }}"
