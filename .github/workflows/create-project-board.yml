name: Create Devonn Project Board
on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  create-board:
    runs-on: ubuntu-latest
    steps:
      - name: Create Project Board (classic)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            // Create a classic project board (doesn't require project scope)
            const columns = [
              'Backlog',
              'In Progress',
              'Review / Testing',
              'Merged / Done'
            ];

            let project;
            try {
              const res = await github.rest.projects.createForOrg({
                org: 'wesship',
                name: 'Devonn Ecosystem — Phase 3 Hardening',
                body: 'Tracks all hardening, security, and automation work across the 9 Devonn repos.'
              });
              project = res.data;
              console.log('Created project:', project.html_url);
            } catch (e) {
              console.log('Org project failed, trying repo project:', e.message);
              const res = await github.rest.projects.createForRepo({
                owner: 'wesship',
                repo: 'supreme-ai-deployment-hub',
                name: 'Devonn Ecosystem — Phase 3 Hardening',
                body: 'Tracks all hardening, security, and automation work.'
              });
              project = res.data;
              console.log('Created repo project:', project.html_url);
            }

            // Create columns
            for (const col of columns) {
              await github.rest.projects.createColumn({
                project_id: project.id,
                name: col
              });
              console.log('Created column:', col);
            }

            console.log('Project board ready:', project.html_url);
