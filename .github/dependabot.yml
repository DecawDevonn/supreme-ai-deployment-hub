version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    labels:
      - "security"
      - "auto-merge"
    commit-message:
      prefix: "security"
    open-pull-requests-limit: 10
    groups:
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
      ui-components:
        patterns:
          - "lucide-react"
          - "@radix-ui/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    labels:
      - "security"
      - "auto-merge"
    commit-message:
      prefix: "ci"
    open-pull-requests-limit: 5
